function router() {
  const hash = window.location.hash.slice(1);
  const content = document.getElementById('content');

  if (hash.startsWith('s/')) {
    content.innerHTML = renderSystemDetail(hash.slice(2));
  } else if (hash.startsWith('skills/')) {
    content.innerHTML = renderSkillDetail(hash.slice(7));
  } else if (hash.startsWith('w/')) {
    content.innerHTML = renderWorkflowDetail(hash.slice(2));
  } else {
    content.innerHTML = renderHome();
  }
  window.scrollTo(0, 0);
}

window.addEventListener('hashchange', router);
router();
