version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install fastapi uvicorn[standard] pydantic httpx python-dotenv
run:
  command: uvicorn rostr.api_server:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
    env: PORT
  env:
    - name: PYTHONUNBUFFERED
      value: "1"
